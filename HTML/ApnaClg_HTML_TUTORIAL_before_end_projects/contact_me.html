<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me</title>
    
</head> 
<body style="background: linear-gradient(to right, #ffecd2, #fcb69f);">
     

    <h1 style="background-color: darkslategray;color: white;text-align: center; display: block;width: 100%;">Contact Me</h1>
    <br> <br> <hr width="60%" >
    <h3 style="text-align: center; color: hotpink;">Feel free to reach out to me!</h3>
<form action="submit.html" method="get" >
    <input type="text" placeholder="Your Name" style="display: block; margin: 0 auto; padding: 10px; width: 50%;"><br>

    <input type="email" placeholder="Your Email" style="display: block; margin: 0 auto; padding: 10px; width: 50%;"><br>
     
    <input type="text" placeholder="Your Phone Number" style="display: block; margin: 0 auto; padding: 10px; width: 50%;"><br>

    <textarea placeholder="Your Message" style="display: block; margin: 0 auto; padding: 10px; width: 50%; height: 100px; background-color: #f0f0f0; border: 1px solid #ccc;"></textarea><br> 

    <h3 style="text-align: center; color: purple;">I will get back to you as soon as possible!</h3> <br>

    <button style="display: block; margin: 0 auto; padding: 10px 20px; background-color: seagreen; color: white; border: none; cursor: pointer; ">Submit</button>
</form>
    <hr width="60%" > <br> <br>


     <span style="text-align: left;"><a href="index.html">Return to Home</a> </span> 
</body>
</html>
